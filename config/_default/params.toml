# -- 主题选项 --
# 这些选项控制主题的功能和网站的显示效果
# 详细文档：https://blowfish.page/docs/configuration/#theme-parameters

# 配色方案（默认紫色）
colorScheme = "blowfish"
# 可选：blowfish, avocado, fire, ocean, forest, princess, neon, bloody, terminal, marvel, noir, autumn, congo, slate, github, one-light

defaultAppearance = "light"  # 默认外观：light（浅色）或 dark（深色）
autoSwitchAppearance = true  # 自动跟随系统主题切换

enableA11y = false           # 启用无障碍功能
enableSearch = true         # 启用搜索功能
enableCodeCopy = false      # 代码块复制按钮
enableStructuredBreadcrumbs = false  # 结构化面包屑（SEO优化）

replyByEmail = false         # 启用"邮件回复"功能

# mainSections = ["section1", "section2"]  # 指定"最近文章"显示的板块
# robots = ""               # 搜索引擎配置

disableImageOptimization = false      # 禁用图片优化
disableImageOptimizationMD = false   # 仅禁用 Markdown 图片优化
disableTextInHeader = false           # 禁用页头文字（适合纯 Logo）

defaultBackgroundImage = "img/background.jpg"  # 默认背景图
# defaultFeaturedImage = "IMAGE.jpg"       # 文章默认缩略图
# defaultSocialImage = "/android-chrome-512x512.png"  # 社交分享图
hotlinkFeatureImage = false           # 图片外链模式

fingerprintAlgorithm = "sha512"         # 静态文件指纹算法（sha512/sha384/sha256）

# Gitea/Forgejo 集成
giteaDefaultServer = "https://git.fsfe.org"
forgejoDefaultServer = "https://v11.next.forgejo.org"

# -- 页头 --
[header]
  layout = "fixed-fill-blur"  # basic（默认）/ fixed（固定）/ fixed-fill / fixed-gradient / fixed-fill-blur

# -- 页脚 --
[footer]
  showMenu = true              # 显示底部菜单
  showCopyright = true         # 显示版权信息
  showThemeAttribution = true  # 显示"主题支持"
  showAppearanceSwitcher = true  # 显示主题切换按钮
  showScrollToTop = true       # 显示"返回顶部"按钮

# -- 主页 --
[homepage]
  layout = "background"  # page / profile / hero / card / background / custom
  homepageImage = "img/background.jpg"  # 用于 hero 和 card 布局
  
  showRecent = false       # 显示最新文章
  showRecentItems = 5     # 显示数量
  showMoreLink = false    # 显示"查看更多"
  showMoreLinkDest = "/posts/"  # 链接指向
  
  cardView = false         # 卡片布局
  cardViewScreenWidth = false  # 卡片全宽
  layoutBackgroundBlur = true  # 背景模糊（仅 background 布局）
  disableHeroImageFilter = false  # 禁用图片滤镜（仅 hero 布局）

# -- 文章页 --
[article]
  showDate = true              # 显示日期
  showViews = false            # 显示阅读量（需 Firebase）
  showLikes = false            # 显示点赞（需 Firebase）
  showDateOnlyInArticle = false  # 仅在文章内显示日期
  showDateUpdated = false      # 显示更新日期
  showAuthor = false            # 显示作者
  # showAuthorBottom = false    # 作者信息放底部
  
  showHero = true              # 缩略图为 Hero 图
  heroStyle = "background"     # basic / big / background / thumbAndBackground
  
  showBreadcrumbs = false      # 面包屑导航
  showDraftLabel = true        # 显示草稿标签
  showEdit = false             # 显示编辑链接
  showHeadingAnchors = true    # 标题锚点
  showPagination = true       # 上/下篇导航
  showReadingTime = true       # 阅读时间
  showTableOfContents = false  # 文章目录
  showWordCount = true         # 字数统计
  
  showTaxonomies = false       # 显示分类/标签
  showCategories = true        # 显示分类
  showTags = true              # 显示标签
  showAuthorsBadges = false    # 作者徽章
  
  showZenMode = false          # 禅模式（隐藏界面）

# -- 列表页 --
[list]
  showBreadcrumbs = false      # 面包屑
  showSummary = false          # 显示摘要
  showCards = false            # 卡片样式
  groupByYear = true           # 按年份分组
  orderByWeight = false        # 按权重排序

# -- 站点地图 --
[sitemap]
  excludedKinds = ["taxonomy", "term"]  # 排除的页面类型

# -- 分类法 --
[taxonomy]
  showTermCount = true         # 显示文章数量


