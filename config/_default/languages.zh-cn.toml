# 语言代码（ISO 639-1）
locale = "zh-cn"

# 语言选择器中显示的名称
label = "简体中文"

# 排序权重，数字越小排序越靠前
weight = 9

# 中文版网站标题
title = "饿梦博客"

# ============================================
# 显示参数配置
# ============================================
[params]
  # 语言切换按钮上显示的缩写
  displayName = "简体中文"
  
  # ISO 语言代码
  isoCode = "zh-cn"
  
  # 是否启用从右到左显示（阿拉伯语、希伯来语等需要）
  rtl = false
  
  # 日期显示格式
  # 2006 = 年，01 = 月，02 = 日
  dateFormat = "2006-01-02"
  
  # 网站 Logo 图片路径（相对于 static 目录）
  # 留空表示不使用 logo
  logo = ""
  
  # 次要 Logo（用于暗色模式等场景）
  # secondaryLogo = "img/secondary-logo.png"
  
  # 网站描述（用于 SEO 和订阅）
  description = "DevOps开发"
  
  # 版权信息（支持 HTML）
  # copyright = "© 2026 饿梦"

# ============================================
# 作者信息配置
# ============================================
[params.author]
  # 作者显示名称
  name = "饿梦"
  
  # 联系邮箱
  # email = "youremail@example.com"
  
  # 头像图片路径（相对于 static 目录）
  # 留空表示不使用头像
  image = ""
  
  # 头像图片质量（1-100）
  # imageQuality = 96
  
  # 副标题/签名
  headline = "DevOps开发者"
  
  # 个人简介
  # bio = "记录学习过程，分享技术心得"
  
